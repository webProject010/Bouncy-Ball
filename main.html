<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing Ball</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            height: 100%;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
            margin-top: 20px;
            letter-spacing: 2px;
        }

        canvas {
            border: 3px solid rgba(100, 200, 255, 0.3);
            border-radius: 10px;
            background: radial-gradient(circle at 20% 50%, rgba(50, 50, 100, 0.3), transparent),
                        radial-gradient(circle at 80% 80%, rgba(100, 50, 150, 0.2), transparent),
                        rgba(10, 10, 30, 0.8);
            box-shadow: 0 0 30px rgba(100, 200, 255, 0.2),
                        inset 0 0 30px rgba(50, 100, 150, 0.1);
            flex-grow: 1;
            max-height: calc(100% - 200px);
        }

        .controls {
            display: flex;
            gap: 15px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 200, 255, 0.2);
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            color: rgba(200, 200, 255, 0.7);
            text-align: center;
            font-size: 0.9rem;
            padding: 0 20px;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px rgba(100, 200, 255, 0.5); }
            50% { text-shadow: 0 0 30px rgba(100, 200, 255, 0.8); }
        }

        h1 {
            animation: glow 3s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Bouncing Ball</h1>
        <canvas id="canvas"></canvas>
        <div class="controls">
            <button onclick="addBall()">Add Ball</button>
            <button onclick="clearBalls()">Clear</button>
            <button onclick="toggleGravity()">Toggle Gravity</button>
        </div>
        <div class="info">Click anywhere to drop a ball. Use buttons to add multiple balls or toggle gravity effects.</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let balls = [];
        let gravity = 0.5;
        let friction = 0.99;
        let gravityEnabled = true;
        let animationId;

        // Resize canvas to fit the container
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }

        // Ball class
        class Ball {
            constructor(x, y, radius = 15) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                this.trailPoints = [];
            }

            update() {
                if (gravityEnabled) {
                    this.vy += gravity;
                }

                this.x += this.vx;
                this.y += this.vy;

                this.vx *= friction;
                this.vy *= friction;

                // Bounce off walls
                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx = Math.abs(this.vx) * 0.8;
                }
                if (this.x + this.radius > canvas.width) {
                    this.x = canvas.width - this.radius;
                    this.vx = -Math.abs(this.vx) * 0.8;
                }

                // Bounce off top
                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.vy = Math.abs(this.vy) * 0.8;
                }

                // Bounce off bottom
                if (this.y + this.radius > canvas.height) {
                    this.y = canvas.height - this.radius;
                    this.vy = -Math.abs(this.vy) * 0.8;
                }

                // Add trail point
                this.trailPoints.push({ x: this.x, y: this.y });
                if (this.trailPoints.length > 30) {
                    this.trailPoints.shift();
                }
            }

            draw() {
                // Draw trail
                if (this.trailPoints.length > 1) {
                    ctx.strokeStyle = this.color;
                    ctx.globalAlpha = 0.3;
                    ctx.lineWidth = this.radius * 0.5;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.beginPath();
                    ctx.moveTo(this.trailPoints[0].x, this.trailPoints[0].y);
                    for (let i = 1; i < this.trailPoints.length; i++) {
                        ctx.lineTo(this.trailPoints[i].x, this.trailPoints[i].y);
                    }
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }

                // Draw ball with glow
                const gradient = ctx.createRadialGradient(this.x - 5, this.y - 5, 0, this.x, this.y, this.radius);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, this.color + '80');

                ctx.fillStyle = gradient;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Draw shine
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(this.x - 5, this.y - 5, this.radius * 0.3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Add a ball at coordinates
        function addBallAtCoords(x, y) {
            balls.push(new Ball(x, y));
        }

        function addBall() {
            const x = Math.random() * (canvas.width - 60) + 30;
            const y = Math.random() * (canvas.height * 0.3) + 50;
            addBallAtCoords(x, y);
        }

        function clearBalls() {
            balls = [];
        }

        function toggleGravity() {
            gravityEnabled = !gravityEnabled;
        }

        // Click to add ball
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            addBallAtCoords(x, y);
        });

        // Animation loop
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let ball of balls) {
                ball.update();
                ball.draw();
            }

            animationId = requestAnimationFrame(animate);
        }

        // Initialize
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        animate();

        // Start with some balls
        for (let i = 0; i < 3; i++) {
            addBall();
        }
    </script>
</body>
</html>
