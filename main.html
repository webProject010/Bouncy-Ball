<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing Ball</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            width: 95%;
            height: 95%;
            gap: 15px;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
            letter-spacing: 2px;
        }

        canvas {
            border: 3px solid rgba(100, 200, 255, 0.3);
            border-radius: 10px;
            background: rgba(10, 10, 30, 0.9);
            box-shadow: 0 0 30px rgba(100, 200, 255, 0.2);
            width: 100%;
            flex: 1;
            cursor: crosshair;
        }

        .controls {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            border: 1px solid rgba(100, 200, 255, 0.2);
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 15px;
            font-size: 0.95rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            color: rgba(200, 200, 255, 0.7);
            text-align: center;
            font-size: 0.85rem;
            max-width: 600px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>⚡ Bouncing Ball</h1>
        <canvas id="canvas"></canvas>
        <div class="controls">
            <button onclick="addBall()">Add Ball</button>
            <button onclick="clearBalls()">Clear</button>
            <button onclick="toggleGravity()">Toggle Gravity</button>
        </div>
        <div class="info">Click on the canvas to drop balls. Use buttons to add multiple balls or toggle gravity effects.</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });

        let balls = [];
        let gravity = 0.5;
        let friction = 0.99;
        let gravityEnabled = true;

        class Ball {
            constructor(x, y, radius = 15) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.hue = Math.random() * 360;
                this.color = 'hsl(' + this.hue + ', 100%, 50%)';
                this.trailPoints = [];
            }

            update() {
                if (gravityEnabled) {
                    this.vy += gravity;
                }

                this.x += this.vx;
                this.y += this.vy;

                this.vx *= friction;
                this.vy *= friction;

                // Bounce off walls
                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx = Math.abs(this.vx) * 0.8;
                }
                if (this.x + this.radius > canvas.width) {
                    this.x = canvas.width - this.radius;
                    this.vx = -Math.abs(this.vx) * 0.8;
                }

                // Bounce off top
                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.vy = Math.abs(this.vy) * 0.8;
                }

                // Bounce off bottom
                if (this.y + this.radius > canvas.height) {
                    this.y = canvas.height - this.radius;
                    this.vy = -Math.abs(this.vy) * 0.8;
                }

                // Trail
                this.trailPoints.push({ x: this.x, y: this.y });
                if (this.trailPoints.length > 20) {
                    this.trailPoints.shift();
                }
            }

            draw() {
                // Trail
                if (this.trailPoints.length > 1) {
                    ctx.strokeStyle = this.color;
                    ctx.globalAlpha = 0.2;
                    ctx.lineWidth = this.radius * 0.4;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.beginPath();
                    ctx.moveTo(this.trailPoints[0].x, this.trailPoints[0].y);
                    for (var i = 1; i < this.trailPoints.length; i++) {
                        ctx.lineTo(this.trailPoints[i].x, this.trailPoints[i].y);
                    }
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }

                // Ball
                var grad = ctx.createRadialGradient(this.x - 5, this.y - 5, 0, this.x, this.y, this.radius);
                grad.addColorStop(0, this.color);
                grad.addColorStop(1, this.color.replace('100%', '30%'));

                ctx.fillStyle = grad;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Shine
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.beginPath();
                ctx.arc(this.x - 4, this.y - 4, this.radius * 0.25, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }

        function addBall(x, y) {
            if (x === undefined || y === undefined) {
                x = Math.random() * (canvas.width - 60) + 30;
                y = Math.random() * (canvas.height * 0.3) + 50;
            }
            balls.push(new Ball(x, y));
        }

        function clearBalls() {
            balls = [];
        }

        function toggleGravity() {
            gravityEnabled = !gravityEnabled;
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 30, 0.95)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (var i = 0; i < balls.length; i++) {
                balls[i].update();
                balls[i].draw();
            }

            requestAnimationFrame(animate);
        }

        canvas.addEventListener('click', function(e) {
            var rect = canvas.getBoundingClientRect();
            var x = e.clientX - rect.left;
            var y = e.clientY - rect.top;
            addBall(x, y);
        });

        window.addEventListener('resize', resizeCanvas);

        resizeCanvas();
        animate();

        // Start with 3 balls
        addBall();
        addBall();
        addBall();
    </script>
</body>
</html>
